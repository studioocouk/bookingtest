name = "booking-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "booking-db"
database_id   = "2a8989f9-a4bb-4add-9e59-6e34d0000317"
# Create with: wrangler d1 create booking-db

# ── KV Namespace (availability cache) ─────────────────────
[[kv_namespaces]]
binding = "KV"
id      = "cec9a951b4c8461b8f5f25bc000b798e"
# Create with: wrangler kv:namespace create booking-cache

# ── Environment variables (secrets set separately) ────────
# Set secrets with:
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put ADMIN_SECRET
#   wrangler secret put RESEND_API_KEY

[vars]
YOUR_NAME   = "studioo"
YOUR_EMAIL  = "info@studioo.co.uk"
WIDGET_URL  = "https://booking.yourdomain.pages.dev"
